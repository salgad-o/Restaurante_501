{% extends 'gestion/base.html' %}
{% block content %}
<div class="card">
    <h2>¿Eliminar Factura #{{ factura.id }}?</h2>
    <p>Orden: #{{ factura.orden.id }}</p>
    <p>Total: ${{ factura.total_factura }}</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit">Sí, eliminar</button>
        <a href="/facturas/"><button type="button">Cancelar</button></a>
    </form>
</div>
{% endblock %}
