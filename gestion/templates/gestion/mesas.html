{% extends 'gestion/base.html' %}
{% block content %}
<h2>Mesas</h2>

<a href="/mesas/crear/">
    <button>Agregar Mesa</button>
</a>

<table>
    <tr>
        <th>ID</th>
        <th>Número</th>
        <th>Capacidad</th>
        <th>Estado</th>
        <th>Acciones</th>
    </tr>
    {% for mesa in mesas %}
    <tr>
        <td>{{ mesa.id }}</td>
        <td>{{ mesa.numero_mesa }}</td>
        <td>{{ mesa.capacidad }}</td>
        <td>{{ mesa.estado_mesa }}</td>
        <td>
            <a href="/mesas/editar/{{ mesa.id }}/">
                <button>Editar</button>
            </a>
            <a href="/mesas/eliminar/{{ mesa.id }}/">
                <button>Eliminar</button>
            </a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
