<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restaurante Pasta La Vista</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #8B0000;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background-color: #b22222;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 12px;
            text-decoration: none;
            font-weight: bold;
        }
        .contenedor {
            width: 90%;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        table, th, td {
            border: 1px solid #ccc;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #eee;
        }
        .card {
            display: inline-block;
            width: 200px;
            background: #fafafa;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Sistema de Gestión de Pedidos - Pasta La Vista</h1>
    </header>

    <nav>
        <a href="/">Inicio</a>
        <a href="/clientes/">Clientes</a>
        <a href="/empleados/">Empleados</a>
        <a href="/mesas/">Mesas</a>
        <a href="/platos/">Platos</a>
        <a href="/ordenes/">Órdenes</a>
        <a href="/facturas/">Facturas</a>
        <a href="/admin/">Admin</a>
    </nav>

    <div class="contenedor">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
