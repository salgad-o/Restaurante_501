{% extends 'gestion/base.html' %}
{% block content %}
<div class="card">
    <h2>¿Eliminar a {{ empleado.nombre }}?</h2>
    <form method="POST">
        {% csrf_token %}
        <button type="submit">Sí, eliminar</button>
        <a href="/empleados/"><button type="button">Cancelar</button></a>
    </form>
</div>
{% endblock %}
